<!-- HGT Login Design -->
<body class="login-body">
    <div class="login-background-slider">
        <div class="slide" style="background-image: url('assets/bg_login_1.png')"></div>
        <div class="slide" style="background-image: url('assets/bg_login_2.png')"></div>
        <div class="slide" style="background-image: url('assets/bg_login_3.png')"></div>
    </div>
    <div class="login-card">
        <img src="assets/logo_hgt_interfaz.png" alt="HGT Logo" class="login-logo">
        <p class="login-subtitle">ACCESO AL SISTEMA</p>
        
        <form>
            <div class="form-group floating-label">
                <input type="text" id="username" class="form-control" placeholder=" " required autofocus>
                <label for="username">Usuario</label>
            </div>
            <div class="form-group floating-label password-wrapper">
                <input type="password" id="password" class="form-control" placeholder=" " required>
                <label for="password">Contraseña</label>
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <i class="fa-solid fa-eye" id="toggleIcon"></i>
                </button>
            </div>
            <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
        </form>
    </div>

    <footer class="login-footer">
        <p>Hansetic Global Terminals Inland Services - Departamento TI © 2026 Todos los derechos reservados</p>
    </footer>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
