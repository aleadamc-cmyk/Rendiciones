<!-- HGT Modals Design -->

<!-- Alerta de Éxito/Error -->
<div id="premiumAlertModal" class="modal alert-modal" style="display: block; position: relative; z-index: 1;">
    <div class="modal-content">
        <div class="alert-modal-icon success">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <div class="alert-modal-title">Operación Exitosa</div>
        <div class="alert-modal-message">El registro se ha guardado correctamente en el sistema.</div>
        <button class="btn btn-primary">ACEPTAR</button>
    </div>
</div>

<!-- Modal de Confirmación -->
<div id="premiumConfirmModal" class="modal alert-modal" style="display: block; position: relative; z-index: 1; margin-top: 2rem;">
    <div class="modal-content" style="border-top-color: var(--hgt-dawn);">
        <div class="alert-modal-icon error">
            <i class="fa-solid fa-circle-question"></i>
        </div>
        <div class="alert-modal-title">¿Está seguro?</div>
        <div class="alert-modal-message">Esta acción no se puede deshacer. ¿Desea continuar?</div>
        <div class="confirm-modal-actions">
            <button class="btn btn-secondary">CANCELAR</button>
            <button class="btn btn-danger">CONFIRMAR</button>
        </div>
    </div>
</div>
