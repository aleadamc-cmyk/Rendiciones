<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HGT Asignaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body class="login-body">
    <div class="login-background-slider">
        <div class="slide" style="background-image: url('{{ url_for('static', filename='img/bg_login_1.png') }}')"></div>
        <div class="slide" style="background-image: url('{{ url_for('static', filename='img/bg_login_2.png') }}')"></div>
        <div class="slide" style="background-image: url('{{ url_for('static', filename='img/bg_login_3.png') }}')"></div>
    </div>
    <div class="login-card">
        <img src="{{ url_for('static', filename='img/logo_hgt_interfaz.png') }}" alt="HGT Logo" class="login-logo">
        <p class="login-subtitle">SISTEMA DE ASIGNACIONES</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group floating-label">
                <input type="text" id="username" name="username" class="form-control" placeholder=" " required autofocus maxlength="50" autocomplete="username">
                <label for="username">Usuario</label>
            </div>
            <div class="form-group floating-label password-wrapper">
                <input type="password" id="password" name="password" class="form-control" placeholder=" " required maxlength="128" autocomplete="current-password">
                <label for="password">Contraseña</label>
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <i class="fa-solid fa-eye" id="toggleIcon"></i>
                </button>
            </div>
            <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
        </form>
    </div>

    <footer class="login-footer">
        <p>Hansetic Global Terminals Inland Services - Departamento TI © 2026 Todos los derechos reservados</p>
    </footer>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
